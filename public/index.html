<!DOCTYPE html>
    <html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- FAVICON -->
        <link rel="shortcut icon" href="assets/img/favicon.png" type="image/x-icon">

        <!-- CSS -->
        <link rel="stylesheet" href="ohota-poest\src\assets\css\style.css">

        <title>Охота поесть</title>
    </head>
    <body>
    <div id="root">
        <!-- HEADER -->
        <header class="header">
            <nav>
                <a href="" class="nav__logo">ОХОТА ПОЕСТЬ</a>
                <div class="nav__menu">
                    <div>
                        <ul class="nav__list">
                            <li class="nav__item">
                                <a href="" class="nav__link">
                                    Рецепты
                                </a>
                            </li>
    
                            <li class="nav__item">
                                <a href="" class="nav__link">
                                    О сайте
                                </a>
                            </li>
                        </ul>
                    </div>
                    <div>
                        <form class="nav__search__container" action="" method="post">
                          <input class="nav__search__input" type="search" placeholder="Поиск по сайту" name="search">
                          <button class="nav__search__button" type="submit"><img class="search__img" src="assets/img/search.svg"></button>
                        </form>
                    </div>
                </div>
                <button class="nav__button">Поделиться рецептом</button>
            </nav>
        </header>

        <!-- MAIN -->
        <main class="main">

            <!-- WELCOME -->
            <section class="welcome">
                <div class="welcome__container">
                    <div class="welcome__data">
                        <h1 class="welcome__title">Что сегодня приготовить?</h1>
                        <p class="welcome__description">Здесь собраны мои любимые и проверенные рецепты на любой вкус. Найди нужные по категории блюда, ингредиентам или сложности приготовления!</p>
                    </div>
                    <img src="assets/img/welcome-picture.svg" alt="" class="welcome__img">
                </div>
            </section>

            <!-- LAST RECIPES -->
            <section class="last-recipes">

            </section>
        </main>
    </div>
    </body>
    </html>
